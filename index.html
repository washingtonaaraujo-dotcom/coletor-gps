<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Coletor GPS — PNEZD</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F55B14">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  :root{
    --paper:#F5F6F3;
    --ink:#171E1C;
    --ink-soft:#5A6360;
    --line:#D8DCD6;
    --orange:#F55B14;       /* laranja colete */
    --orange-dark:#C94407;
    --lcd-bg:#1B2420;       /* display estação total */
    --lcd-green:#7DF0A8;
    --lcd-dim:#3E5A4C;
    --ok:#1E8F4E;
    --warn:#C99000;
    --bad:#C23B22;
    --radius:14px;
    --mono:ui-monospace,'Cascadia Mono','Roboto Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    background:var(--paper);color:var(--ink);
    min-height:100vh;padding-bottom:150px;
  }
  header{
    padding:18px 16px 12px;
    display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:3px solid var(--ink);
  }
  header h1{font-size:1.05rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
  header h1 span{color:var(--orange)}
  header .zone{font-family:var(--mono);font-size:.75rem;color:var(--ink-soft)}

  main{padding:14px 14px 0;max-width:560px;margin:0 auto}

  /* ---- display estilo estação total ---- */
  .lcd{
    background:var(--lcd-bg);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:14px;
    font-family:var(--mono);color:var(--lcd-green);
    box-shadow:inset 0 2px 10px rgba(0,0,0,.55), 0 1px 0 rgba(255,255,255,.4);
    border:1px solid #0D1310;
  }
  .lcd .lcd-top{display:flex;justify-content:space-between;font-size:.68rem;color:var(--lcd-dim);letter-spacing:.08em;margin-bottom:8px}
  .lcd .row{display:flex;justify-content:space-between;font-size:1.02rem;line-height:1.65}
  .lcd .row b{font-weight:400;color:var(--lcd-dim);font-size:.78rem;align-self:center}
  .lcd .acc{margin-top:8px;padding-top:8px;border-top:1px dashed var(--lcd-dim);font-size:.78rem;display:flex;justify-content:space-between}
  .acc-ok{color:var(--lcd-green)} .acc-warn{color:#EFD07A} .acc-bad{color:#F09580}

  /* ---- formulário ---- */
  .field-row{display:flex;gap:10px;margin-bottom:12px}
  .field-row .fld{flex:1}
  label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:4px}
  input[type=text]{
    width:100%;padding:12px;font-size:1rem;font-family:var(--mono);
    border:1.5px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);
  }
  input[type=text]:focus{outline:2px solid var(--orange);border-color:var(--orange)}

  .btn-collect{
    width:100%;padding:18px;font-size:1.15rem;font-weight:800;letter-spacing:.03em;
    background:var(--orange);color:#fff;border:none;border-radius:var(--radius);
    box-shadow:0 3px 0 var(--orange-dark);cursor:pointer;text-transform:uppercase;
  }
  .btn-collect:active{transform:translateY(2px);box-shadow:0 1px 0 var(--orange-dark)}
  .btn-collect:disabled{opacity:.65}
  .progress{height:5px;background:var(--line);border-radius:99px;margin-top:10px;overflow:hidden;visibility:hidden}
  .progress i{display:block;height:100%;width:0;background:var(--orange);transition:width .3s}

  /* ---- lista ---- */
  .list-head{display:flex;justify-content:space-between;align-items:center;margin:20px 0 8px}
  .list-head h2{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em}
  .list-head .count{font-family:var(--mono);font-size:.8rem;color:var(--ink-soft)}
  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:.78rem;background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
  th{background:var(--ink);color:#fff;text-align:left;padding:7px 8px;font-size:.65rem;letter-spacing:.05em}
  td{padding:7px 8px;border-top:1px solid var(--line);white-space:nowrap}
  td.del{color:var(--bad);font-weight:700;cursor:pointer;text-align:center}
  .empty{padding:22px;text-align:center;color:var(--ink-soft);font-size:.85rem;background:#fff;border:1px dashed var(--line);border-radius:10px}

  /* ---- barra de exportação ---- */
  .export-bar{
    position:fixed;bottom:0;left:0;right:0;background:#fff;
    border-top:1.5px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    display:flex;gap:8px;flex-wrap:wrap;max-width:560px;margin:0 auto;
  }
  .export-bar button{
    flex:1;min-width:28%;padding:11px 4px;font-size:.76rem;font-weight:700;border-radius:10px;cursor:pointer;
    border:1.5px solid var(--ink);background:#fff;color:var(--ink);
  }
  .export-bar button.primary{background:var(--ink);color:#fff}
  .export-bar button.danger{border-color:var(--bad);color:var(--bad)}

  td.cam{cursor:pointer;text-align:center;font-size:.9rem}
  .photo-overlay{position:fixed;inset:0;background:rgba(10,12,11,.92);z-index:20;display:none;
    flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:12px}
  .photo-overlay.show{display:flex}
  .photo-overlay img{max-width:100%;max-height:70vh;border-radius:12px}
  .photo-overlay .po-title{color:#fff;font-family:var(--mono);font-size:.9rem}
  .photo-overlay .po-btns{display:flex;gap:10px}
  .photo-overlay button{padding:11px 18px;border-radius:10px;font-weight:700;border:none;cursor:pointer}
  .po-close{background:#fff;color:var(--ink)}
  .po-del{background:var(--bad);color:#fff}

  /* ---- sistema de coordenadas ---- */
  .sys-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px}
  .sys-bar .seg{display:flex;border:1.5px solid var(--ink);border-radius:10px;overflow:hidden;flex:1}
  .sys-bar .seg button{flex:1;padding:10px 4px;font-size:.74rem;font-weight:800;border:none;background:#fff;color:var(--ink);cursor:pointer;text-transform:uppercase;letter-spacing:.03em}
  .sys-bar .seg button.on{background:var(--ink);color:#fff}
  .sys-bar .cal{padding:10px 12px;font-size:.74rem;font-weight:700;border:1.5px solid var(--orange);color:var(--orange-dark);background:#fff;border-radius:10px;cursor:pointer;white-space:nowrap}
  .cal-status{font-family:var(--mono);font-size:.68rem;color:var(--ink-soft);margin:-6px 0 12px;text-align:right}

  .toast{
    position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-80px);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;
    font-size:.85rem;transition:transform .3s;z-index:9;white-space:nowrap;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}

  /* ---- mapa ---- */
  .map-head{display:flex;justify-content:space-between;align-items:center;margin:20px 0 8px}
  .map-head h2{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em}
  .map-toggle{font-size:.72rem;font-weight:700;border:1.5px solid var(--ink);background:#fff;
    color:var(--ink);border-radius:8px;padding:6px 10px;cursor:pointer}
  #map{height:300px;border-radius:12px;border:1.5px solid var(--line);z-index:0}
  .pt-label{background:rgba(23,30,28,.85);color:#fff;font-family:var(--mono);font-size:.62rem;
    padding:1px 5px;border-radius:5px;border:none;box-shadow:none;white-space:nowrap}

  /* ---- obras ---- */
  .obra-bar{display:flex;gap:8px;margin:0 0 14px}
  .obra-bar select{flex:1;padding:10px;border:1.5px solid var(--line);border-radius:10px;
    font-family:var(--mono);font-size:.9rem;background:#fff;color:var(--ink)}
  .obra-bar button{border:1.5px solid var(--ink);background:#fff;border-radius:10px;
    padding:0 14px;font-size:1rem;cursor:pointer}
  /* ---- trilha ---- */
  .btn-trail{width:100%;margin-top:8px;padding:12px;font-size:.9rem;font-weight:800;
    background:#fff;color:var(--ink);border:1.5px solid var(--ink);border-radius:12px;cursor:pointer}
  .btn-trail.on{background:var(--ink);color:#7DF0A8;border-color:var(--ink)}
  /* ---- locação ---- */
  .stake{position:fixed;left:12px;right:12px;bottom:76px;background:var(--ink);color:#fff;
    border-radius:16px;padding:14px 16px;z-index:20;display:none;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .stake.show{display:block}
  .stake .st-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .stake .st-head b{font-size:.9rem}
  .stake .st-close{background:none;border:1.5px solid #fff5;color:#fff;border-radius:8px;
    padding:4px 10px;font-size:.75rem;cursor:pointer}
  .stake .st-dist{font-family:var(--mono);font-size:1.9rem;font-weight:700;color:#7DF0A8;text-align:center}
  .stake .st-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px;
    font-family:var(--mono);font-size:.78rem;text-align:center}
  .stake .st-grid span{display:block;font-size:.6rem;opacity:.6;letter-spacing:.06em}
</style>
</head>
<body>

<header>
  <h1>Coletor <span>GPS</span> · PNEZD</h1>
  <div class="zone" id="zoneInfo">UTM SIRGAS2000</div>
</header>

<main>
  <div class="obra-bar">
    <select id="selObra"></select>
    <button id="btnNewObra" title="Nova obra">➕</button>
  </div>
  <div class="lcd">
    <div class="lcd-top"><span>ULT. PONTO</span><span id="lcdName">—</span></div>
    <div class="row"><b>N</b><span id="lcdN">-------.---</span></div>
    <div class="row"><b>E</b><span id="lcdE">------.---</span></div>
    <div class="row"><b>Z</b><span id="lcdZ">---.--</span></div>

  <div class="sys-bar">

  <div class="field-row">
    <div class="fld" style="flex:.45">

      <input type="text" id="prefix" value="PT" maxlength="8">
    </div>

    </div>
    <div class="fld" style="flex:.42">
      <label for="selTime">Leitura</label>
      <select id="selTime" style="width:100%;padding:12px 6px;font-size:.95rem;font-family:var(--mono);border:1.5px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)">
        <option value="6000">6 s</option>
        <option value="15000" selected>15 s</option>
        <option value="30000">30 s</option>
      </select>

  <button class="btn-collect" id="btnCollect">📡 Coletar ponto</button>
  <div class="progress" id="prog"><i id="progBar"></i></div>

  <div class="map-head">
    <h2>Mapa</h2>
    <div style="display:flex;gap:6px">
      <button class="map-toggle" id="btnLocate">📍 Onde estou</button>
      <button class="map-toggle" id="btnLayer">🛰️</button>
    </div>
  </div>
  <div id="map"></div>

  <div class="list-head">
    <h2>Pontos coletados</h2>
    <span class="count" id="count">0 pts</span>
  </div>
  <div id="listWrap">
    <div class="empty">Nenhum ponto ainda. Toque em “Coletar ponto” com o GPS ligado.</div>
  </div>
</main>

<div class="export-bar">
  <button class="primary" id="btnCsv">⬇ PNEZD</button>
  <button id="btnDxf">⬇ DXF</button>
  <button id="btnKml">⬇ KML</button>
  <button id="btnImport">📂 Importar PNEZD</button>
  <button id="btnGsi">⬇ GSI (Leica)</button>
  <button id="btnShare">📤 Compartilhar</button>
  <button class="danger" id="btnClear">Limpar</button>
</div>

<input type="file" id="fileImport" accept=".csv,.txt" style="display:none">
<input type="file" id="filePhoto" accept="image/*" capture="environment" style="display:none">

<div class="photo-overlay" id="photoOverlay">
  <div class="po-title" id="poTitle"></div>
  <img id="poImg" alt="Foto do ponto">
  <div class="po-btns">
    <button class="po-del" id="poDel">Remover foto</button>
    <button class="po-close" id="poClose">Fechar</button>
  </div>
</div>

<div class="stake" id="stakePanel">
  <div class="st-head"><b id="stName">—</b><button class="st-close" id="stClose">Parar</button></div>
  <div class="st-dist" id="stDist">—</div>
  <div class="st-grid">
    <div><span>AZIMUTE</span><b id="stAz">—</b></div>
    <div><span>Δ NORTE</span><b id="stDn">—</b></div>
    <div><span>Δ LESTE</span><b id="stDe">—</b></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
/* ================= WGS84/SIRGAS2000 -> UTM ================= */
function toUTM(lat, lon){
  const a=6378137.0, f=1/298.257222101;           // GRS80 (SIRGAS2000)
  const e2=f*(2-f), ep2=e2/(1-e2), k0=0.9996;
  const zone=Math.floor((lon+180)/6)+1;
  const lon0=((zone-1)*6-180+3)*Math.PI/180;
  const p=lat*Math.PI/180, l=lon*Math.PI/180;
  const N=a/Math.sqrt(1-e2*Math.sin(p)**2);
  const T=Math.tan(p)**2, C=ep2*Math.cos(p)**2, A=Math.cos(p)*(l-lon0);
  const M=a*((1-e2/4-3*e2*e2/64-5*e2**3/256)*p
    -(3*e2/8+3*e2*e2/32+45*e2**3/1024)*Math.sin(2*p)
    +(15*e2*e2/256+45*e2**3/1024)*Math.sin(4*p)
    -(35*e2**3/3072)*Math.sin(6*p));
  const E=500000+k0*N*(A+(1-T+C)*A**3/6+(5-18*T+T*T+72*C-58*ep2)*A**5/120);
  let Nn=k0*(M+N*Math.tan(p)*(A*A/2+(5-T+9*C+4*C*C)*A**4/24+(61-58*T+T*T+600*C-330*ep2)*A**6/720));
  if(lat<0) Nn+=10000000;
  return {E, N:Nn, zone, hem:lat<0?'S':'N'};
}
/* UTM -> lat/lon (para importação) */
function fromUTM(E, N, zone, south){
  const a=6378137.0, f=1/298.257222101;
  const e2=f*(2-f), ep2=e2/(1-e2), k0=0.9996;
  const x=E-500000; let y=N; if(south) y-=10000000;
  const lon0=((zone-1)*6-180+3)*Math.PI/180;
  const M=y/k0, e1=(1-Math.sqrt(1-e2))/(1+Math.sqrt(1-e2));
  const mu=M/(a*(1-e2/4-3*e2*e2/64-5*e2**3/256));
  const p1=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1*e1/16-55*e1**4/32)*Math.sin(4*mu)
    +(151*e1**3/96)*Math.sin(6*mu)+(1097*e1**4/512)*Math.sin(8*mu);
  const C1=ep2*Math.cos(p1)**2, T1=Math.tan(p1)**2;
  const N1=a/Math.sqrt(1-e2*Math.sin(p1)**2);
  const R1=a*(1-e2)/Math.pow(1-e2*Math.sin(p1)**2,1.5);
  const D=x/(N1*k0);
  const lat=p1-(N1*Math.tan(p1)/R1)*(D*D/2-(5+3*T1+10*C1-4*C1*C1-9*ep2)*D**4/24
    +(61+90*T1+298*C1+45*T1*T1-252*ep2-3*C1*C1)*D**6/720);
  const lon=lon0+(D-(1+2*T1+C1)*D**3/6+(5-2*C1+28*T1-3*C1*C1+8*ep2+24*T1*T1)*D**5/120)/Math.cos(p1);
  return {lat:lat*180/Math.PI, lon:lon*180/Math.PI};
}
/* distância e azimute entre dois pontos UTM */
function distAz(p1, p2){
  const dE=p2.E-p1.E, dN=p2.N-p1.N;
  const dist=Math.hypot(dE,dN);
  let az=Math.atan2(dE,dN)*180/Math.PI; if(az<0) az+=360;
  return {dist, az};
}

/* ================= sistema topográfico local (calibração) ================= */
let sys='utm';                 // 'utm' | 'local'
let calPairs=[];               // [{Nu,Eu,Nl,El}, ...] até 2 pares
let transform=null;            // {dN,dE,rot,scale,Nu0,Eu0,Nl0,El0}
function computeTransform(){
  if(!calPairs.length){ transform=null; return; }
  if(calPairs.length===1){
    const p=calPairs[0];
    transform={mode:1, dN:p.Nl-p.Nu, dE:p.El-p.Eu};
  } else {
    const a=calPairs[0], b=calPairs[1];
    const du={E:b.Eu-a.Eu, N:b.Nu-a.Nu};
    const dl={E:b.El-a.El, N:b.Nl-a.Nl};
    const lu=Math.hypot(du.E,du.N), ll=Math.hypot(dl.E,dl.N);
    if(lu<1){ transform={mode:1, dN:a.Nl-a.Nu, dE:a.El-a.Eu}; return; }
    const scale=ll/lu;
    const rot=Math.atan2(dl.E,dl.N)-Math.atan2(du.E,du.N);
    transform={mode:2, scale, rot, Eu0:a.Eu, Nu0:a.Nu, El0:a.El, Nl0:a.Nl};
  }
}
function utm2local(N,E){
  if(!transform) return {N,E};
  if(transform.mode===1) return {N:N+transform.dN, E:E+transform.dE};
  const dE=E-transform.Eu0, dN=N-transform.Nu0;
  const c=Math.cos(transform.rot), s=Math.sin(transform.rot);
  return {
    E: transform.El0 + transform.scale*( dE*c + dN*s ),
    N: transform.Nl0 + transform.scale*( -dE*s + dN*c )
  };
}
/* coordenadas no sistema ativo */
function coords(p){
  if(sys==='local' && transform) return utm2local(p.N,p.E);
  return {N:p.N, E:p.E};
}
function saveCal(){
  localStorage.setItem(K('gps-cal'), JSON.stringify({sys, calPairs}));
}
function loadCal(){
  try{
    const c=JSON.parse(localStorage.getItem(K('gps-cal'))||'null');
    if(c){ calPairs=c.calPairs||[]; computeTransform(); if(c.sys==='local'&&transform) sys='local'; }
  }catch(e){}
  refreshSysUI();
}
function refreshSysUI(){
  $('sysUtm').classList.toggle('on', sys==='utm');
  $('sysLocal').classList.toggle('on', sys==='local');
  const st=$('calStatus');
  if(!transform) st.textContent='Sem calibração — modo topográfico indisponível';
  else if(transform.mode===1) st.textContent='Calibrado: 1 ponto (translação)';
  else st.textContent='Calibrado: 2 pontos (translação + rotação + escala '+transform.scale.toFixed(6)+')';
}
$('sysUtm').addEventListener('click',()=>{ sys='utm'; saveCal(); refreshSysUI(); render(); });
$('sysLocal').addEventListener('click',()=>{
  if(!transform){ toast('Calibre primeiro num ponto conhecido (🎯)'); return; }
  sys='local'; saveCal(); refreshSysUI(); render();
});
$('btnCal').addEventListener('click',()=>{
  if(calPairs.length>=2 && !confirm('Já existem 2 pontos de calibração. Recomeçar calibração?')) return;
  if(calPairs.length>=2) calPairs=[];
  const modo=prompt('Como calibrar este ponto?\n\n1 = GPS em campo (ficar sobre o ponto)\n2 = Manual (digitar UTM + local do projeto)\n\nDigite 1 ou 2:','1');
  if(modo===null) return;
  if(String(modo).trim()==='2'){ calManual(); return; }
  if(!navigator.geolocation){ toast('GPS não disponível'); return; }
  const CAL_MS=parseInt($('selTime').value)||15000;
  toast('Fique parado sobre o ponto conhecido... lendo GPS ('+(CAL_MS/1000)+' s)');
  const samples=[];
  const wid=navigator.geolocation.watchPosition(p=>samples.push(p.coords),
    ()=>toast('Erro de GPS'), {enableHighAccuracy:true,maximumAge:0,timeout:CAL_MS});
  setTimeout(()=>{
    navigator.geolocation.clearWatch(wid);
    if(!samples.length){ toast('Sem leituras de GPS'); return; }
    const bestAcc=Math.min(...samples.map(c=>c.accuracy));
    const limite=Math.max(bestAcc*1.5,8);
    const boas=samples.filter(c=>c.accuracy<=limite);
    const uso=boas.length?boas:samples;
    let sw=0,slat=0,slon=0;
    for(const c of uso){ const w=1/Math.max(c.accuracy,1)**2; sw+=w; slat+=c.latitude*w; slon+=c.longitude*w; }
    const u=toUTM(slat/sw, slon/sw);
    const nl=prompt('Coordenada N (local/projeto) deste ponto:');
    if(nl===null) return;
    const el=prompt('Coordenada E (local/projeto) deste ponto:');
    if(el===null) return;
    const Nl=parseFloat(String(nl).replace(',','.')), El=parseFloat(String(el).replace(',','.'));
    if(isNaN(Nl)||isNaN(El)){ toast('Coordenadas inválidas'); return; }
    calPairs.push({Nu:u.N, Eu:u.E, Nl, El});
    computeTransform(); sys='local'; saveCal(); refreshSysUI(); render();
    toast(calPairs.length===1
      ? 'Calibrado com 1 ponto! Calibre um 2º ponto distante p/ corrigir rotação'
      : 'Calibrado com 2 pontos — translação, rotação e escala ajustadas');
  }, (parseInt($('selTime').value)||15000)+200);
});

function calManual(){
  const pede=(msg)=>{
    const v=prompt(msg);
    if(v===null) return null;
    const n=parseFloat(String(v).replace(/\./g,'').replace(',','.'))
    // aceita "7.409.122,297" ou "7409122.297"
    const n2=parseFloat(String(v).replace(',','.'));
    const num=String(v).includes(',')&&String(v).split('.').length>2 ? n : n2;
    return isNaN(num)?NaN:num;
  };
  const Nu=pede('Ponto conhecido — N em UTM (SIRGAS2000):'); if(Nu===null)return; 
  const Eu=pede('Ponto conhecido — E em UTM (SIRGAS2000):'); if(Eu===null)return;
  const Nl=pede('Mesmo ponto — N no sistema LOCAL do projeto:'); if(Nl===null)return;
  const El=pede('Mesmo ponto — E no sistema LOCAL do projeto:'); if(El===null)return;
  if([Nu,Eu,Nl,El].some(isNaN)){ toast('Valor inválido — use números'); return; }
  if(Nu<100000){ toast('⚠️ N em UTM no Brasil é na casa dos milhões (7.xxx.xxx) — confira'); return; }
  calPairs.push({Nu,Eu,Nl,El});
  computeTransform(); sys='local'; saveCal(); refreshSysUI(); render();
  toast(calPairs.length===1
    ? 'Calibração manual: 1 ponto! Adicione um 2º ponto distante p/ rotação'
    : 'Calibração manual: 2 pontos — translação, rotação e escala ajustadas');
}

/* ================= coleta com média de leituras ================= */
$('btnCollect').addEventListener('click', ()=>{
  if(!navigator.geolocation){ toast('GPS não disponível neste navegador'); return; }
  const SAMPLE_MS=parseInt($('selTime').value)||15000;
  const btn=$('btnCollect'); btn.disabled=true; btn.textContent='📡 Lendo GPS...';
  $('prog').style.visibility='visible';
  const samples=[]; const t0=Date.now();
  const timer=setInterval(()=>{
    $('progBar').style.width=Math.min(100,(Date.now()-t0)/SAMPLE_MS*100)+'%';
  },200);
  const wid=navigator.geolocation.watchPosition(
    pos=>{
      samples.push(pos.coords);
      /* precisão ao vivo no botão */
      const best=Math.min(...samples.map(c=>c.accuracy));
      btn.textContent=`📡 ±${best.toFixed(1)} m · ${samples.length} leituras`;
    },
    err=>{ finish(); toast('Erro de GPS: '+(err.code===1?'permissão negada':'sem sinal')); },
    {enableHighAccuracy:true, maximumAge:0, timeout:SAMPLE_MS}
  );
  function finish(){
    navigator.geolocation.clearWatch(wid); clearInterval(timer);
    $('prog').style.visibility='hidden'; $('progBar').style.width='0';
    btn.disabled=false; btn.textContent='📡 Coletar ponto';
  }
  setTimeout(()=>{
    finish();
    if(!samples.length){ toast('Sem leituras — verifique o GPS'); return; }
    /* filtro: descarta leituras muito piores que a melhor */
    let bestAcc=Math.min(...samples.map(c=>c.accuracy));
    const limite=Math.max(bestAcc*1.5, 8);
    const boas=samples.filter(c=>c.accuracy<=limite);
    const uso=boas.length?boas:samples;
    /* média ponderada por 1/precisão² */
    let sw=0,slat=0,slon=0,salt=0,swAlt=0;
    for(const c of uso){
      const w=1/Math.max(c.accuracy,1)**2;
      sw+=w; slat+=c.latitude*w; slon+=c.longitude*w;
      if(c.altitude!=null){ salt+=c.altitude*w; swAlt+=w; }
    }
    const lat=slat/sw, lon=slon/sw;
    const alt=swAlt>0? salt/swAlt : 0;
    const u=toUTM(lat,lon);
    const num=points.length? Math.max(...points.map(p=>p.num))+1 : 1;
    const pt={
      num, name:($('prefix').value.trim()||'PT')+num,
      N:u.N, E:u.E, Z:alt, desc:($('desc').value.trim()||'PONTO'),
      acc:bestAcc, zone:u.zone+u.hem, lat, lon,
      time:new Date().toLocaleTimeString('pt-BR')
    };
    const prev=points[points.length-1];
    points.push(pt); savePoints(); render(); showLcd(pt);
    let msg=`${pt.name} gravado (±${bestAcc.toFixed(1)} m, ${uso.length}/${samples.length} leituras)`;
    if(prev){ const da=distAz(prev,pt); msg+=` · ${da.dist.toFixed(1)} m do ${prev.name}`; }
    toast(msg);
  }, SAMPLE_MS);
});

/* inversa: local -> UTM */
function local2utm(N,E){
  if(!transform) return {N,E};
  if(transform.mode===1) return {N:N-transform.dN, E:E-transform.dE};
  const dE=(E-transform.El0)/transform.scale, dN=(N-transform.Nl0)/transform.scale;
  const c=Math.cos(-transform.rot), s=Math.sin(-transform.rot);
  return { E: transform.Eu0 + dE*c + dN*s, N: transform.Nu0 - dE*s + dN*c };
}
$('btnImport').addEventListener('click',()=>{ $('fileImport').value=''; $('fileImport').click(); });
$('fileImport').addEventListener('change', e=>{
  const file=e.target.files[0]; if(!file) return;
  let isLocal=false;
  if(transform) isLocal=confirm('Os pontos do arquivo estão em coordenadas TOPOGRÁFICAS LOCAIS do projeto?\n\nOK = local · Cancelar = UTM');
  let fuso=23;
  if(!isLocal){
    const fusoStr=prompt('Fuso UTM dos pontos (SIRGAS2000, hemisfério Sul):','23');
    if(fusoStr===null) return;
    fuso=parseInt(fusoStr)||23;
  } else {
    fuso = points.length ? parseInt(points[0].zone) : 23;
  }
  const reader=new FileReader();
  reader.onload=()=>{
    const lines=reader.result.split(/\r?\n/).filter(l=>l.trim());
    const nova=[];
    for(const line of lines){
      const c=line.split(/[,;\t]+|\s{2,}/).map(s=>s.trim()).filter(s=>s!=='');
      if(c.length<3) continue;
      let N=parseFloat(c[1]), E=parseFloat(c[2]);
      if(isNaN(N)||isNaN(E)) continue;
      const Z=parseFloat(c[3])||0, desc=c[4]||'';
      const Nl=N, El=E;
      if(isLocal){ const u=local2utm(N,E); N=u.N; E=u.E; }
      const ll=fromUTM(E,N,fuso,true);
      nova.push({name:String(c[0]), N, E, Nl, El, Z, desc, lat:ll.lat, lon:ll.lon, isLocal});
    }
    if(!nova.length){ toast('Nenhum ponto válido no arquivo (formato P,N,E,Z,D)'); return; }
    imported=nova; savePoints(); updateMap();
    toast(nova.length+' pontos do projeto no mapa (azul)');
  };
  reader.readAsText(file);
});

let map, markersLayer, satOn=true;
const satLayer=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19, attribution:'Esri'});
const osmLayer=L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19, attribution:'© OpenStreetMap'});
function initMap(){
  map=L.map('map',{zoomControl:true}).setView([-23.4,-46.6],11);
  satLayer.addTo(map);
  markersLayer=L.layerGroup().addTo(map);
  $('btnLayer').addEventListener('click',()=>{
    satOn=!satOn;
    if(satOn){ map.removeLayer(osmLayer); satLayer.addTo(map); }
    else{ map.removeLayer(satLayer); osmLayer.addTo(map); }
  });
}
function updateMap(){
  if(!map) return;
  markersLayer.clearLayers();
  const bounds=[];
  /* pontos do projeto (importados) em azul */
  for(const p of imported){
    if(p.lat==null) continue;
    const m=L.circleMarker([p.lat,p.lon],{radius:6,color:'#2A7FFF',weight:2,fillColor:'#2A7FFF',fillOpacity:.4});
    m.bindTooltip(p.name,{permanent:true,direction:'top',offset:[0,-7],className:'pt-label'});
    const dN=(p.isLocal?p.Nl:p.N), dE=(p.isLocal?p.El:p.E);
    m.bindPopup(`<b>${p.name}</b> (projeto${p.isLocal?' · local':''})<br>${p.desc}<br>N: ${dN.toFixed(3)}<br>E: ${dE.toFixed(3)}<br>Z: ${p.Z.toFixed(2)}<br><button onclick="startStake(\'i\',${imported.indexOf(p)})" style="margin-top:5px;padding:5px 12px;border-radius:8px;border:none;background:#F55B14;color:#fff;font-weight:700;cursor:pointer">📐 Locar</button>`);
    markersLayer.addLayer(m);
    bounds.push([p.lat,p.lon]);
  }
  /* pontos coletados em laranja */
  const pts=points.filter(p=>p.lat!=null&&p.lon!=null);
  for(let i=0;i<pts.length;i++){
    const p=pts[i]; const cc=coords(p);
    const m=L.circleMarker([p.lat,p.lon],{radius:7,color:'#F55B14',weight:2.5,fillColor:'#F55B14',fillOpacity:.55});
    m.bindTooltip(p.name+' · '+p.desc,{permanent:true,direction:'top',offset:[0,-8],className:'pt-label'});
    let pop=`<b>${p.name}</b> — ${p.desc}<br>N: ${cc.N.toFixed(3)}<br>E: ${cc.E.toFixed(3)}<br>Z: ${p.Z.toFixed(2)}<br>±${p.acc.toFixed(1)} m · ${p.time||''}`;
    if(i>0){ const da=distAz(pts[i-1],p); pop+=`<br>↔ ${da.dist.toFixed(1)} m do ${pts[i-1].name} · Az ${da.az.toFixed(1)}°`; }
    pop+=`<br><button onclick="startStake('c',${points.indexOf(p)})" style="margin-top:5px;padding:5px 12px;border-radius:8px;border:none;background:#F55B14;color:#fff;font-weight:700;cursor:pointer">📐 Locar</button>`;
    m.bindPopup(pop);
    markersLayer.addLayer(m);
    bounds.push([p.lat,p.lon]);
  }
  if(!bounds.length) return;
  if(bounds.length===1) map.setView(bounds[0],18);
  else map.fitBounds(bounds,{padding:[35,35],maxZoom:19});
}


/* ================= trilha automática ================= */
let trailWid=null, trailLast=null, trailStep=10, trailCount=0;
function stopTrail(silent){
  if(trailWid!=null){ navigator.geolocation.clearWatch(trailWid); trailWid=null;
    $('btnTrail').classList.remove('on');
    $('btnTrail').textContent='🛤️ Trilha automática: desligada';
    if(!silent) toast('Trilha parada — '+trailCount+' pontos gravados');
  }
}
$('btnTrail').addEventListener('click',()=>{
  if(trailWid!=null){ stopTrail(); return; }
  if(!navigator.geolocation){ toast('GPS não disponível'); return; }
  const passo=prompt('Gravar um ponto a cada quantos metros?','10');
  if(passo===null) return;
  trailStep=Math.max(2, parseFloat(String(passo).replace(',','.'))||10);
  trailLast=null; trailCount=0;
  $('btnTrail').classList.add('on');
  $('btnTrail').textContent='🛤️ Trilha LIGADA (a cada '+trailStep+' m) — toque p/ parar';
  trailWid=navigator.geolocation.watchPosition(pos=>{
    const c=pos.coords;
    if(c.accuracy>15) return;                      /* ignora leitura ruim */
    const u=toUTM(c.latitude,c.longitude);
    if(trailLast){
      const d=Math.hypot(u.E-trailLast.E, u.N-trailLast.N);
      if(d<trailStep) return;
    }
    trailLast=u; trailCount++;
    const num=points.length? Math.max(...points.map(p=>p.num))+1 : 1;
    const pt={num, name:($('prefix').value.trim()||'PT')+num,
      N:u.N, E:u.E, Z:(c.altitude!=null?c.altitude:0),
      desc:($('desc').value.trim()||'TRILHA'), acc:c.accuracy,
      zone:u.zone+u.hem, lat:c.latitude, lon:c.longitude,
      time:new Date().toLocaleTimeString('pt-BR')};
    points.push(pt); savePoints(); render(); showLcd(pt);
  }, ()=>{}, {enableHighAccuracy:true, maximumAge:0});
  toast('Trilha ligada — caminhe; gravo a cada '+trailStep+' m');
});

/* ================= locação (stakeout) ================= */
let stakeWid=null;
function stopStake(){
  if(stakeWid!=null){ navigator.geolocation.clearWatch(stakeWid); stakeWid=null; }
  $('stakePanel').classList.remove('show');
}
$('stClose').addEventListener('click', stopStake);
window.startStake=function(kind, idx){
  const p = kind==='i' ? imported[idx] : points[idx];
  if(!p){ toast('Ponto não encontrado'); return; }
  let tgt;
  if(p.N!=null && p.E!=null) tgt={N:p.N, E:p.E};
  else if(p.lat!=null) tgt=toUTM(p.lat, p.lon);
  else { toast('Ponto sem coordenadas utilizáveis'); return; }
  if(map && p.lat!=null) map.closePopup && map.closePopup();
  stopStake();
  $('stName').textContent='📐 Locando: '+p.name;
  $('stakePanel').classList.add('show');
  if(!navigator.geolocation){ toast('GPS não disponível'); return; }
  let vibrou=false;
  stakeWid=navigator.geolocation.watchPosition(pos=>{
    const c=pos.coords;
    const cur=toUTM(c.latitude, c.longitude);
    const a=coords(cur), b=coords(tgt);          /* no sistema ativo */
    const dN=b.N-a.N, dE=b.E-a.E;
    const dist=Math.hypot(dN,dE);
    let az=Math.atan2(dE,dN)*180/Math.PI; if(az<0)az+=360;
    $('stDist').textContent = dist>=1000 ? (dist/1000).toFixed(2)+' km'
                            : dist.toFixed(dist<10?2:1)+' m';
    $('stAz').textContent=az.toFixed(1)+'°';
    $('stDn').textContent=(dN>=0?'+':'')+dN.toFixed(2)+' m';
    $('stDe').textContent=(dE>=0?'+':'')+dE.toFixed(2)+' m';
    $('stDist').style.color = dist<=1 ? '#7DF0A8' : (dist<=5 ? '#FFD84D' : '#fff');
    if(dist<=1 && !vibrou){ vibrou=true; if(navigator.vibrate) navigator.vibrate([150,80,150]); }
    if(dist>1.5) vibrou=false;
  }, ()=>toast('Erro de GPS na locação'), {enableHighAccuracy:true, maximumAge:0});
};

/* ================= GSI16 (Leica) ================= */
function gsiWord(wi, info, val_mm){
  const neg=val_mm<0; const v=Math.round(Math.abs(val_mm));
  return wi+info+(neg?'-':'+')+String(v).padStart(16,'0');
}
$('btnGsi').addEventListener('click',()=>{
  if(!points.length){ toast('Nenhum ponto para exportar'); return; }
  const lines=points.map((p,i)=>{
    const c=coords(p);
    const pn=String(p.num||i+1).padStart(16,'0');
    return '*11'+String(i+1).padStart(4,'0')+'+'+pn+' '
      + gsiWord('81','..10', c.E*1000) + ' '
      + gsiWord('82','..10', c.N*1000) + ' '
      + gsiWord('83','..10', p.Z*1000);
  });
  const sysTag = (sys==='local'&&transform)?'local':'utm';
  download('pontos_'+sysTag+'.gsi', lines.join('\r\n')+'\r\n', 'text/plain');
  toast('GSI16 exportado — transferir p/ TS06 (E=81, N=82, Z=83, mm)');
});

/* ================= compartilhar (WhatsApp etc.) ================= */
$('btnShare').addEventListener('click', async ()=>{
  if(!points.length){ toast('Nenhum ponto para compartilhar'); return; }
  const sysTag=(sys==='local'&&transform)?'local':'utm';
  const csv=points.map(p=>{ const c=coords(p);
    return [p.num,c.N.toFixed(3),c.E.toFixed(3),p.Z.toFixed(3),p.desc].join(','); }).join('\r\n')+'\r\n';
  const file=new File([csv], 'pontos_'+sysTag+'.csv', {type:'text/csv'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:'Pontos GPS',
      text:'Pontos PNEZD ('+sysTag.toUpperCase()+') — '+points.length+' pts'}); }
    catch(e){ /* usuário cancelou */ }
  } else {
    download('pontos_'+sysTag+'.csv', csv, 'text/csv');
    toast('Compartilhar não suportado aqui — arquivo baixado');
  }
});

initMap();
loadObras();
loadCal();
loadPoints();
refreshSysUI();
</script>
